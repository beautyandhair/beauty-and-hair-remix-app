query CartInput($productTags: [String!]!, $collectionIds: [ID!]!) {
  cart {
    lines {
      id
      merchandise {
        __typename
        ... on ProductVariant {
          id
          metafield(namespace: "global", key: "CLEARANCE") {
            value
          }
          product {
            hasAnyTag(tags: $productTags)
            inAnyCollection(ids: $collectionIds)
          }
        }
      }
      sellingPlanAllocation {
        sellingPlan {
          id
          name
        }
      }
      cost {
        subtotalAmount {
          amount
        }
        totalAmount {
          amount
        }
      }
      discountAllocations {
        discountedAmount {
          amount
        }
      }
      attribute(key: "_attribution") {
        key
        value
      }
    }
  }
  discount {
    discountClasses
    metafield(namespace: "b-h-discounts", key: "function-configuration") {
      value
    }
  }
}
